# M.Y. INK — Netlify Build & Deploy Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[build]
  publish = "dist/public"
  command = "pnpm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for the CMS admin panel
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Cache content files for short periods so CMS edits go live quickly
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"
