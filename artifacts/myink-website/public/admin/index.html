<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — M.Y. INK</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      /* ═══════════════════════════════════════════════════════════
         M.Y. INK — Decap CMS Live Preview Templates
         All templates use React.Component class syntax (no hooks)
         for maximum reliability in the preview iframe context.
      ═══════════════════════════════════════════════════════════ */

      // ── Load fonts into every preview iframe ─────────────────
      CMS.registerPreviewStyle(
        'https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap'
      );

      CMS.registerPreviewStyle([
        '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }',
        'body { font-family: Inter, sans-serif; background: #F7F7F7; color: #0D0D0D; }',
        'h1,h2,h3,h4,h5 { font-family: Syne, sans-serif; font-weight: 700; margin: 0; }',
        'p { margin: 0; }',
        'a { text-decoration: none; color: inherit; }',
        'button { cursor: pointer; font-family: inherit; }',
        'ul { list-style: none; margin: 0; padding: 0; }',
        'em { font-style: italic; }',
        '.section-label { background: #121212; padding: 6px 48px; }',
        '.section-label span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: #E87722; }',
        '.mobile-wrap { transition: max-width 0.3s ease; overflow: hidden; }',
      ].join(' '), { raw: true });

      // ── Design tokens ────────────────────────────────────────
      var T = {
        primary:   '#E87722',
        bg:        '#F7F7F7',
        fg:        '#0D0D0D',
        muted:     '#474747',
        dark:      '#121212',
        border:    '#DEDEDE',
        card:      '#FFFFFF',
      };

      var h = React.createElement;

      /* ─────────────────────────────────────────────────────────
         SAFE DATA HELPER
         Wraps all Immutable.js access in try/catch.
         Returns '' for missing fields, JS array for list fields.
      ───────────────────────────────────────────────────────── */
      function gf(entry) {
        return function() {
          try {
            var path = ['data'].concat(Array.prototype.slice.call(arguments));
            var val = entry.getIn(path);
            if (val === null || val === undefined) return '';
            if (val && typeof val.toJS === 'function') return val.toJS();
            return String(val);
          } catch (e) { return ''; }
        };
      }

      /* ─────────────────────────────────────────────────────────
         SECTION LABEL  (static functional component)
      ───────────────────────────────────────────────────────── */
      function SectionLabel(props) {
        return h('div', { className: 'section-label' },
          h('span', null, props.text),
        );
      }

      /* ─────────────────────────────────────────────────────────
         PREVIEW SHELL  (class component — mobile / desktop toggle)
      ───────────────────────────────────────────────────────── */
      var PreviewShell = (function(_super) {
        function PreviewShell(props) {
          _super.call(this, props);
          this.state = { mobile: false };
          this.toMobile  = this.toMobile.bind(this);
          this.toDesktop = this.toDesktop.bind(this);
        }
        PreviewShell.prototype = Object.create(_super.prototype);
        PreviewShell.prototype.constructor = PreviewShell;
        PreviewShell.prototype.toMobile  = function() { this.setState({ mobile: true }); };
        PreviewShell.prototype.toDesktop = function() { this.setState({ mobile: false }); };

        PreviewShell.prototype.render = function() {
          var mobile = this.state.mobile;
          var accent = this.props.accent || T.primary;

          var btnBase = {
            padding: '4px 14px',
            fontSize: 9,
            fontWeight: 700,
            letterSpacing: '0.18em',
            textTransform: 'uppercase',
            border: '1px solid',
            cursor: 'pointer',
          };

          return h('div', { style: { fontFamily: 'Inter, sans-serif', background: T.bg, minHeight: '100vh' } },
            // ── Control bar ──────────────────────────────────
            h('div', {
              style: {
                position: 'sticky', top: 0, zIndex: 9999,
                background: T.dark, borderBottom: '1px solid rgba(255,255,255,0.05)',
                padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12,
              },
            },
              h('span', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 14, color: '#fff', letterSpacing: '-0.02em' } }, 'M.Y. INK'),
              h('span', { style: { fontSize: 9, fontWeight: 700, color: accent, textTransform: 'uppercase', letterSpacing: '0.18em', background: accent + '22', padding: '2px 8px' } }, 'Live Preview'),
              h('div', { style: { marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center' } },
                h('span', { style: { fontSize: 9, color: 'rgba(255,255,255,0.25)', textTransform: 'uppercase', letterSpacing: '0.12em', marginRight: 4 } }, 'View as:'),
                h('button', {
                  onClick: this.toDesktop,
                  style: Object.assign({}, btnBase, {
                    background: !mobile ? accent : 'transparent',
                    color: !mobile ? '#fff' : 'rgba(255,255,255,0.35)',
                    borderColor: !mobile ? accent : 'rgba(255,255,255,0.15)',
                  }),
                }, 'Desktop'),
                h('button', {
                  onClick: this.toMobile,
                  style: Object.assign({}, btnBase, {
                    background: mobile ? accent : 'transparent',
                    color: mobile ? '#fff' : 'rgba(255,255,255,0.35)',
                    borderColor: mobile ? accent : 'rgba(255,255,255,0.15)',
                  }),
                }, 'Mobile'),
              ),
            ),
            // ── Page canvas ──────────────────────────────────
            h('div', {
              style: {
                margin: mobile ? '20px auto' : 0,
                maxWidth: mobile ? 390 : '100%',
                boxShadow: mobile ? '0 0 0 1px rgba(0,0,0,0.1), 0 8px 40px rgba(0,0,0,0.15)' : 'none',
                background: T.bg,
              },
            }, this.props.children),
          );
        };

        return PreviewShell;
      }(React.Component));

      /* ═══════════════════════════════════════════════════════════
         HOME PAGE PREVIEW
      ═══════════════════════════════════════════════════════════ */
      var HomePreview = (function(_super) {
        function HomePreview() { _super.apply(this, arguments); }
        HomePreview.prototype = Object.create(_super.prototype);
        HomePreview.prototype.constructor = HomePreview;

        HomePreview.prototype.render = function() {
          var g = gf(this.props.entry);
          var line1   = g('hero', 'headline_line1')  || 'Creative Thinking.';
          var line2   = g('hero', 'headline_line2')  || 'Strategic Execution.';
          var italic  = g('hero', 'headline_italic') || 'Meaningful Growth.';
          var body    = g('hero', 'body')            || '';
          var badge   = g('hero', 'location_badge')  || 'Nassau, Bahamas · Strategic Marketing Firm';

          var ip1     = g('brand_intro', 'headline_part1')  || 'We are not an agency for everyone.';
          var iItalic = g('brand_intro', 'headline_italic') || 'We work with brands';
          var ip2     = g('brand_intro', 'headline_part2')  || 'that have something real to say.';
          var ib1     = g('brand_intro', 'body1') || '';
          var ib2     = g('brand_intro', 'body2') || '';

          var servHl  = g('what_we_do', 'headline') || 'Five disciplines. One standard.';

          return h(PreviewShell, null,
            // ── Hero ──────────────────────────────────────────
            h(SectionLabel, { text: 'Hero Section' }),
            h('section', { style: { background: T.bg, padding: '64px 48px 48px', borderBottom: '1px solid ' + T.border } },
              h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 36 } },
                h('span', { style: { width: 6, height: 6, borderRadius: '50%', background: T.primary, display: 'inline-block' } }),
                h('span', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: 'rgba(0,0,0,0.3)' } }, badge),
              ),
              h('h1', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: 'clamp(40px, 7vw, 88px)', lineHeight: 0.94, letterSpacing: '-0.03em', color: T.fg } },
                line1, h('br'), line2, h('br'),
                h('em', { style: { color: T.primary } }, italic),
              ),
              h('div', { style: { marginTop: 40, paddingTop: 32, borderTop: '1px solid ' + T.border } },
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted, maxWidth: 560 } }, body),
              ),
            ),

            // ── Brand Intro ────────────────────────────────────
            h(SectionLabel, { text: 'Brand Intro Section' }),
            h('section', { style: { background: T.bg, padding: '64px 48px', borderBottom: '1px solid ' + T.border } },
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 56 } },
                h('div', null,
                  h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 'clamp(22px, 2.8vw, 38px)', lineHeight: 1.1, letterSpacing: '-0.025em', color: T.fg } },
                    ip1 + ' ',
                    h('em', { style: { color: T.primary } }, iItalic),
                    ' ' + ip2,
                  ),
                ),
                h('div', { style: { display: 'flex', flexDirection: 'column', gap: 20 } },
                  h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, ib1),
                  h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, ib2),
                ),
              ),
            ),

            // ── What We Do ─────────────────────────────────────
            h(SectionLabel, { text: 'What We Do Section' }),
            h('section', { style: { background: T.dark, padding: '64px 48px' } },
              h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 16 } }, 'Our Expertise'),
              h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 40, lineHeight: 1.1, letterSpacing: '-0.025em', color: '#fff' } }, servHl),
            ),
          );
        };

        return HomePreview;
      }(React.Component));

      CMS.registerPreviewTemplate('home', HomePreview);

      /* ═══════════════════════════════════════════════════════════
         ABOUT PAGE PREVIEW
      ═══════════════════════════════════════════════════════════ */
      var AboutPreview = (function(_super) {
        function AboutPreview() { _super.apply(this, arguments); }
        AboutPreview.prototype = Object.create(_super.prototype);
        AboutPreview.prototype.constructor = AboutPreview;

        AboutPreview.prototype.render = function() {
          var g = gf(this.props.entry);

          var hEyebrow = g('hero', 'eyebrow')         || 'Who We Are';
          var hLine1   = g('hero', 'headline_1')       || 'We believe every brand has a';
          var hItalic  = g('hero', 'headline_italic')  || 'story';
          var hLine2   = g('hero', 'headline_2')       || 'worth telling well.';
          var hCol1    = g('hero', 'intro_col1')       || '';
          var hCol2    = g('hero', 'intro_col2')       || '';

          var sEyebrow = g('story', 'eyebrow')  || 'Our Story';
          var sHl      = g('story', 'headline') || 'Built for brands serious about where they are going.';
          var sBody1   = g('story', 'body1')    || '';
          var sBody2   = g('story', 'body2')    || '';
          var sBody3   = g('story', 'body3')    || '';

          var statsArr = g('stats') || [];

          var pHl      = g('principles', 'headline') || 'Four principles we do not negotiate on.';
          var pSub     = g('principles', 'subtext')  || '';
          var pItems   = g('principles', 'items')    || [];

          var philEy   = g('philosophy', 'eyebrow')  || 'How We Think';
          var philHl   = g('philosophy', 'headline') || 'The philosophy behind the work.';
          var philItems = g('philosophy', 'items')   || [];

          var tEyebrow = g('team', 'eyebrow')  || 'The Team';
          var tHl      = g('team', 'headline') || 'Senior people on every account.';
          var tSub     = g('team', 'subtext')  || '';
          var tMembers = g('team', 'members')  || [];

          var ctaEy    = g('cta', 'eyebrow')         || 'Work With Us';
          var ctaL1    = g('cta', 'headline_1')       || 'The right relationship starts with';
          var ctaItal  = g('cta', 'headline_italic')  || 'the right conversation.';
          var ctaSub   = g('cta', 'subtext')          || '';

          return h(PreviewShell, null,
            // ── Hero ────────────────────────────────────────────
            h(SectionLabel, { text: 'Hero Section' }),
            h('section', { style: { background: T.bg, padding: '80px 48px', borderBottom: '1px solid ' + T.border } },
              h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 24 } }, hEyebrow),
              h('h1', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: 'clamp(32px, 5.5vw, 72px)', lineHeight: 1.0, letterSpacing: '-0.03em', color: T.fg, marginBottom: 40 } },
                hLine1 + ' ',
                h('em', { style: { color: T.primary } }, hItalic),
                ' ' + hLine2,
              ),
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40 } },
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, hCol1),
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, hCol2),
              ),
            ),

            // ── Our Story ───────────────────────────────────────
            h(SectionLabel, { text: 'Our Story Section' }),
            h('section', { style: { background: T.card, padding: '64px 48px', borderBottom: '1px solid ' + T.border } },
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'start' } },
                h('div', { style: { background: T.dark, aspectRatio: '4/5', display: 'flex', alignItems: 'center', justifyContent: 'center' } },
                  h('span', { style: { color: 'rgba(255,255,255,0.2)', fontSize: 13 } }, 'Story Image'),
                ),
                h('div', null,
                  h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 16 } }, sEyebrow),
                  h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 28, lineHeight: 1.15, letterSpacing: '-0.02em', color: T.fg, marginBottom: 24 } }, sHl),
                  h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
                    h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, sBody1),
                    h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, sBody2),
                    h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, sBody3),
                  ),
                ),
              ),
            ),

            // ── Stats ────────────────────────────────────────────
            h(SectionLabel, { text: 'Stats Section' }),
            h('section', { style: { background: T.bg, padding: '40px 48px', borderBottom: '1px solid ' + T.border } },
              h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(' + Math.max(statsArr.length, 4) + ', 1fr)' } },
                statsArr.map(function(stat, i) {
                  return h('div', { key: i, style: { padding: '12px 24px', borderRight: i < statsArr.length - 1 ? '1px solid ' + T.border : 'none', textAlign: 'center' } },
                    h('span', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 48, color: T.primary, display: 'block', lineHeight: 1 } }, stat.value || ''),
                    h('span', { style: { fontSize: 13, color: T.muted, marginTop: 8, display: 'block', lineHeight: 1.4 } }, stat.label || ''),
                  );
                }),
              ),
            ),

            // ── Principles ──────────────────────────────────────
            h(SectionLabel, { text: 'Principles Section' }),
            h('section', { style: { background: T.bg, padding: '64px 48px', borderBottom: '1px solid ' + T.border } },
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginBottom: 48 } },
                h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 36, lineHeight: 1.1, letterSpacing: '-0.02em', color: T.fg } }, pHl),
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted, alignSelf: 'end' } }, pSub),
              ),
              h('div', null,
                pItems.map(function(item, i) {
                  return h('div', { key: i, style: { display: 'grid', gridTemplateColumns: 'auto 1fr 2fr', gap: '16px 48px', padding: '24px 0', borderTop: '1px solid ' + T.border } },
                    h('span', { style: { fontSize: 11, fontWeight: 700, color: T.primary + '66', letterSpacing: '0.1em', paddingTop: 4 } }, item.num || ''),
                    h('h3', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 20, lineHeight: 1.2, color: T.fg } }, item.title || ''),
                    h('p', { style: { fontSize: 15, lineHeight: 1.72, color: T.muted } }, item.desc || ''),
                  );
                }),
              ),
            ),

            // ── Philosophy ──────────────────────────────────────
            h(SectionLabel, { text: 'Philosophy Section' }),
            h('section', { style: { background: T.dark, padding: '64px 48px' } },
              h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 16 } }, philEy),
              h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 36, lineHeight: 1.1, letterSpacing: '-0.02em', color: '#fff', marginBottom: 48 } }, philHl),
              h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(' + Math.max(philItems.length, 3) + ', 1fr)', gap: 0 } },
                philItems.map(function(item, i) {
                  return h('div', { key: i, style: { padding: '32px', borderLeft: i > 0 ? '1px solid rgba(255,255,255,0.07)' : 'none' } },
                    h('div', { style: { width: 28, height: 2, background: T.primary, marginBottom: 28 } }),
                    h('h3', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 18, color: '#fff', lineHeight: 1.3, marginBottom: 16 } }, item.title || ''),
                    h('p', { style: { fontSize: 14, lineHeight: 1.8, color: 'rgba(255,255,255,0.5)' } }, item.desc || ''),
                  );
                }),
              ),
            ),

            // ── Team ────────────────────────────────────────────
            h(SectionLabel, { text: 'Team Section' }),
            h('section', { style: { background: T.card, padding: '64px 48px', borderBottom: '1px solid ' + T.border } },
              h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 16 } }, tEyebrow),
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 40 } },
                h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 32, lineHeight: 1.1, letterSpacing: '-0.02em', color: T.fg } }, tHl),
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, tSub),
              ),
              h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 } },
                tMembers.map(function(member, i) {
                  return h('div', { key: i },
                    h('div', { style: { background: T.dark, aspectRatio: '3/4', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16, overflow: 'hidden' } },
                      member.photo
                        ? h('img', { src: member.photo, style: { width: '100%', height: '100%', objectFit: 'cover', opacity: 0.7 } })
                        : h('span', { style: { color: 'rgba(255,255,255,0.2)', fontSize: 12 } }, 'Photo'),
                    ),
                    h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.15em', color: T.primary, marginBottom: 6 } }, member.role || ''),
                    h('p', { style: { fontSize: 13, color: T.muted } }, member.specialty || ''),
                  );
                }),
              ),
            ),

            // ── CTA ─────────────────────────────────────────────
            h(SectionLabel, { text: 'CTA Section' }),
            h('section', { style: { background: T.dark, padding: '64px 48px' } },
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, alignItems: 'end' } },
                h('div', null,
                  h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 20 } }, ctaEy),
                  h('h2', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 'clamp(28px, 4vw, 52px)', lineHeight: 1.08, letterSpacing: '-0.025em', color: '#fff', marginBottom: 20 } },
                    ctaL1 + ' ',
                    h('em', { style: { color: T.primary } }, ctaItal),
                  ),
                  h('p', { style: { fontSize: 17, lineHeight: 1.72, color: 'rgba(255,255,255,0.5)' } }, ctaSub),
                ),
                h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
                  h('div', { style: { background: T.primary, color: '#fff', padding: '16px 24px', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', textAlign: 'center' } }, 'Start a Conversation'),
                  h('div', { style: { border: '1px solid rgba(255,255,255,0.12)', color: 'rgba(255,255,255,0.7)', padding: '16px 24px', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', textAlign: 'center' } }, 'See Our Work'),
                ),
              ),
            ),
          );
        };

        return AboutPreview;
      }(React.Component));

      CMS.registerPreviewTemplate('about', AboutPreview);

      /* ═══════════════════════════════════════════════════════════
         WORK PAGE PREVIEW
      ═══════════════════════════════════════════════════════════ */
      var WorkPreview = (function(_super) {
        function WorkPreview() { _super.apply(this, arguments); }
        WorkPreview.prototype = Object.create(_super.prototype);
        WorkPreview.prototype.constructor = WorkPreview;

        WorkPreview.prototype.render = function() {
          var g = gf(this.props.entry);
          var eyebrow    = g('page_eyebrow')   || 'Our Work';
          var headline   = g('headline')       || 'Work that earns';
          var hItalic    = g('headline_italic') || 'its results.';
          var col1       = g('intro_col1')     || '';
          var col2       = g('intro_col2')     || '';
          var socialNote = g('social_note')    || '';

          return h(PreviewShell, null,
            h(SectionLabel, { text: 'Page Hero' }),
            h('section', { style: { background: T.bg, padding: '80px 48px', borderBottom: '1px solid ' + T.border } },
              h('p', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: T.primary, marginBottom: 28 } }, eyebrow),
              h('h1', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: 'clamp(40px, 6vw, 78px)', lineHeight: 1.02, letterSpacing: '-0.03em', color: T.fg, marginBottom: 40 } },
                headline, h('br'),
                h('em', { style: { color: T.primary } }, hItalic),
              ),
              h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40 } },
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, col1),
                h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted } }, col2),
              ),
            ),
            h(SectionLabel, { text: 'Social Invite' }),
            h('section', { style: { background: T.bg, padding: '40px 48px' } },
              h('p', { style: { fontSize: 17, lineHeight: 1.72, color: T.muted, maxWidth: 640 } }, socialNote),
            ),
          );
        };
