<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — M.Y. INK</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>

      /* ═══════════════════════════════════════════════════════════
         M.Y. INK — Decap CMS Preview Templates
         Matches actual site: Syne display + Inter body
         Colors: #F7F7F7 bg · #0D0D0D fg · #E87722 primary · #121212 dark
      ═══════════════════════════════════════════════════════════ */

      var h = React.createElement;

      /* ── Design tokens (match index.css exactly) ─────────────── */
      var T = {
        primary:  '#E87722',
        bg:       '#F7F7F7',
        fg:       '#0D0D0D',
        muted:    '#474747',
        dark:     '#121212',
        card:     '#FFFFFF',
        border:   '#DEDEDE',
        mutedBg:  '#EBEBEB',
      };

      /* ── Load fonts into preview iframe ─────────────────────── */
      CMS.registerPreviewStyle(
        'https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap'
      );

      /* ── Base CSS injected into preview iframe ───────────────── */
      CMS.registerPreviewStyle(`
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
          font-family: 'Inter', sans-serif;
          background: #F7F7F7;
          color: #0D0D0D;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        h1,h2,h3,h4,h5,h6 {
          font-family: 'Syne', sans-serif;
          font-weight: 700;
        }
        h1 { letter-spacing: -0.03em; }
        h2 { letter-spacing: -0.025em; }
        h3 { letter-spacing: -0.015em; }
        p { margin: 0; line-height: 1.72; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        em { font-style: italic; }
        img { display: block; max-width: 100%; }
        ::selection { background: rgba(232,119,34,0.15); color: #0D0D0D; }
      `, { raw: true });

      /* ── Safe field getter (handles Immutable.js) ────────────── */
      function gf(entry) {
        return function() {
          try {
            var path = ['data'].concat(Array.prototype.slice.call(arguments));
            var val = entry.getIn(path);
            if (val === null || val === undefined) return '';
            if (val && typeof val.toJS === 'function') return val.toJS();
            return String(val);
          } catch(e) { return ''; }
        };
      }

      /* ── Section label bar ───────────────────────────────────── */
      function SectionTag(props) {
        return h('div', {
          style: {
            background: T.dark,
            padding: '5px 20px',
            display: 'flex',
            alignItems: 'center',
            gap: 8,
          }
        },
          h('span', { style: { width: 4, height: 4, borderRadius: '50%', background: T.primary, display: 'inline-block', flexShrink: 0 } }),
          h('span', { style: { fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.22em', color: 'rgba(255,255,255,0.4)', fontFamily: 'Inter, sans-serif' } }, props.text),
        );
      }

      /* ── Eyebrow label (orange uppercase) ────────────────────── */
      function Eyebrow(props) {
        return h('p', {
          style: {
            fontFamily: 'Inter, sans-serif',
            fontSize: 11,
            fontWeight: 700,
            textTransform: 'uppercase',
            letterSpacing: '0.2em',
            color: T.primary,
            marginBottom: props.mb || 24,
          }
        }, props.text);
      }

      /* ── Orange primary button ───────────────────────────────── */
      function PrimaryBtn(props) {
        return h('div', {
          style: {
            display: 'inline-flex',
            alignItems: 'center',
            gap: 8,
            background: T.primary,
            color: '#fff',
            padding: '14px 28px',
            fontFamily: 'Inter, sans-serif',
            fontSize: 11,
            fontWeight: 700,
            textTransform: 'uppercase',
            letterSpacing: '0.1em',
            cursor: 'pointer',
          }
        }, props.label, h('span', null, '→'));
      }

      /* ── Ghost button ────────────────────────────────────────── */
      function GhostBtn(props) {
        return h('div', {
          style: {
            display: 'inline-flex',
            alignItems: 'center',
            gap: 8,
            border: '1px solid rgba(255,255,255,0.15)',
            color: 'rgba(255,255,255,0.7)',
            padding: '14px 28px',
            fontFamily: 'Inter, sans-serif',
            fontSize: 11,
            fontWeight: 700,
            textTransform: 'uppercase',
            letterSpacing: '0.1em',
            cursor: 'pointer',
          }
        }, props.label, h('span', null, '↗'));
      }

      /* ── Sticky top bar (matches actual navbar) ──────────────── */
      function Navbar(props) {
        return h('nav', {
          style: {
            background: 'rgba(247,247,247,0.95)',
            backdropFilter: 'blur(10px)',
            borderBottom: '1px solid ' + T.border,
            padding: '16px 48px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            position: 'sticky',
            top: 0,
            zIndex: 100,
          }
        },
          h('span', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 18, letterSpacing: '-0.04em', color: T.fg } }, props.siteName || 'M.Y. INK'),
          h('div', { style: { display: 'flex', gap: 32 } },
            ['Home','About','Services','Work','Insights'].map(function(l) {
              return h('span', { key: l, style: { fontFamily: 'Inter, sans-serif', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'rgba(13,13,13,0.55)' } }, l);
            })
          ),
          h('div', {
            style: {
              background: T.primary,
              color: '#fff',
              padding: '11px 22px',
              fontFamily: 'Inter, sans-serif',
              fontSize: 10,
              fontWeight: 700,
              textTransform: 'uppercase',
              letterSpacing: '0.1em',
            }
          }, 'Begin a Conversation'),
        );
      }

      /* ══════════════════════════════════════════════════════════
         HOME PAGE PREVIEW
      ══════════════════════════════════════════════════════════ */
      var HomePreview = (function(_super) {
        function HomePreview(props) {
          _super.call(this, props);
          this.state = { mobile: false };
          this.toggle = this.toggle.bind(this);
        }
        HomePreview.prototype = Object.create(_super.prototype);
        HomePreview.prototype.constructor = HomePreview;
        HomePreview.prototype.toggle = function() { this.setState({ mobile: !this.state.mobile }); };

        HomePreview.prototype.render = function() {
          var g = gf(this.props.entry);
          var mobile = this.state.mobile;

          var line1  = g('hero','headline_line1')  || 'Creative Thinking.';
          var line2  = g('hero','headline_line2')  || 'Strategic Execution.';
          var italic = g('hero','headline_italic') || 'Meaningful Growth.';
          var body   = g('hero','body')            || '';
          var badge  = g('hero','location_badge')  || 'Nassau, Bahamas · Strategic Marketing Firm';

          var ip1    = g('brand_intro','headline_part1')  || 'We are not an agency for everyone.';
          var iItal  = g('brand_intro','headline_italic') || 'We work with brands';
          var ip2    = g('brand_intro','headline_part2')  || 'that have something real to say.';
          var ib1    = g('brand_intro','body1') || '';
          var ib2    = g('brand_intro','body2') || '';
          var servHl = g('what_we_do','headline') || 'Five disciplines. One standard.';

          var services = [
            { num:'01', title:'Brand & Marketing Strategy', desc:'Positioning, messaging architecture, and the competitive framework that every other decision should follow.' },
            { num:'02', title:'Campaign Development',       desc:'Integrated campaigns built from a strategy-first foundation, designed to move markets, not just metrics.' },
            { num:'03', title:'Content & Editorial',        desc:'Written, visual and multimedia content that earns attention and builds the authority your brand deserves.' },
            { num:'04', title:'Publicity & Communications', desc:'Media relations, press strategy and communications planning for brands that want to control the narrative.' },
            { num:'05', title:'Digital Presence & Growth',  desc:'Owned and paid digital strategy that builds sustainable presence rather than chasing vanity metrics.' },
          ];

          return h('div', { style: { fontFamily: 'Inter, sans-serif', background: T.bg } },

            /* ── Preview toolbar ── */
            h('div', {
              style: {
                background: T.dark,
                padding: '10px 24px',
                display: 'flex',
                alignItems: 'center',
                gap: 12,
                position: 'sticky',
                top: 0,
                zIndex: 200,
              }
            },
              h('span', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 14, color: '#fff', letterSpacing: '-0.02em' } }, 'M.Y. INK'),
              h('span', { style: { fontSize: 9, fontWeight: 700, color: T.primary, textTransform: 'uppercase', letterSpacing: '0.18em', background: T.primary + '22', padding: '2px 8px' } }, 'Live Preview'),
              h('div', { style: { marginLeft: 'auto', display: 'flex', gap: 6 } },
                h('button', {
                  onClick: function() { this.setState({ mobile: false }); }.bind(this),
                  style: { padding: '4px 12px', fontSize: 9, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', border: '1px solid', cursor: 'pointer', background: !mobile ? T.primary : 'transparent', color: !mobile ? '#fff' : 'rgba(255,255,255,0.35)', borderColor: !mobile ? T.primary : 'rgba(255,255,255,0.15)' }
                }, 'Desktop'),
                h('button', {
                  onClick: function() { this.setState({ mobile: true }); }.bind(this),
                  style: { padding: '4px 12px', fontSize: 9, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', border: '1px solid', cursor: 'pointer', background: mobile ? T.primary : 'transparent', color: mobile ? '#fff' : 'rgba(255,255,255,0.35)', borderColor: mobile ? T.primary : 'rgba(255,255,255,0.15)' }
                }, 'Mobile'),
              ),
            ),

            /* ── Page canvas ── */
            h('div', {
              style: {
                margin: mobile ? '20px auto' : 0,
                maxWidth: mobile ? 390 : '100%',
                boxShadow: mobile ? '0 0 0 1px rgba(0,0,0,0.1), 0 8px 40px rgba(0,0,0,0.15)' : 'none',
                overflow: 'hidden',
              }
            },

              /* Navbar */
              h(Navbar, null),

              /* ── HERO ── */
              h(SectionTag, { text: 'Hero Section' }),
              h('section', {
                style: {
                  background: 'linear-gradient(135deg, #F0EEE9 0%, #F7F7F7 50%, #EDEDEA 100%)',
                  padding: mobile ? '60px 24px 48px' : '80px 80px 64px',
                  borderBottom: '1px solid ' + T.border,
                  position: 'relative',
                  minHeight: mobile ? 'auto' : '85vh',
                  display: 'flex',
                  flexDirection: 'column',
                  justifyContent: 'center',
                }
              },
                /* diagonal accent lines */
                h('div', { style: { position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', opacity: 0.5 } },
                  h('div', { style: { position: 'absolute', top: '-20%', left: '30%', width: 1, height: '160%', background: 'linear-gradient(180deg, transparent, ' + T.primary + '40, transparent)', transform: 'rotate(15deg)' } }),
                  h('div', { style: { position: 'absolute', top: '-20%', left: '55%', width: 1, height: '160%', background: 'linear-gradient(180deg, transparent, ' + T.primary + '25, transparent)', transform: 'rotate(15deg)' } }),
                ),
                h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 40 } },
                  h('span', { style: { width: 6, height: 6, borderRadius: '50%', background: T.primary, display: 'inline-block' } }),
                  h('span', { style: { fontFamily: 'Inter, sans-serif', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: 'rgba(0,0,0,0.3)' } }, badge),
                ),
                h('h1', {
                  style: {
                    fontFamily: 'Syne, sans-serif',
                    fontWeight: 800,
                    fontSize: mobile ? 52 : 'clamp(64px, 9vw, 108px)',
                    lineHeight: 0.94,
                    letterSpacing: '-0.03em',
                    color: T.fg,
                    marginBottom: 48,
                  }
                },
                  line1, h('br'),
                  line2, h('br'),
                  h('em', { style: { color: T.primary, fontStyle: 'italic' } }, italic),
                ),
                h('div', {
                  style: {
                    display: 'grid',
                    gridTemplateColumns: mobile ? '1fr' : '1fr 1fr',
                    gap: 32,
                    paddingTop: 32,
                    borderTop: '1px solid ' + T.border,
                    alignItems: 'end',
                  }
                },
                  h('p', { style: { fontFamily: 'Inter, sans-serif', fontSize: mobile ? 15 : 17, lineHeight: 1.72, color: T.muted, maxWidth: 480 } }, body),
                  h('div', { style: { display: 'flex', gap: 12, flexWrap: 'wrap' } },
                    h(PrimaryBtn, { label: 'Begin a Conversation' }),
                    h('div', {
                      style: {
                        display: 'inline-flex', alignItems: 'center', gap: 8,
                        border: '1px solid ' + T.border, color: T.fg,
                        padding: '14px 28px', fontFamily: 'Inter, sans-serif',
                        fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em',
                      }
                    }, 'See Our Work', h('span', null, '↗')),
                  ),
                ),
              ),

              /* ── MARQUEE TICKER ── */
              h('div', {
                style: {
                  background: T.dark,
                  borderBottom: '1px solid rgba(255,255,255,0.05)',
                  padding: '14px 0',
                  overflow: 'hidden',
                  display: 'flex',
                }
              },
                h('div', { style: { display: 'flex', gap: 0, whiteSpace: 'nowrap' } },
                  ['Brand Strategy','Campaign Execution','Advertising Concepts','Ghostwriting','Press Events','Digital Strategy','Script Writing','Media Relations',
                   'Brand Strategy','Campaign Execution','Advertising Concepts','Ghostwriting','Press Events','Digital Strategy'].map(function(item, i) {
                    return h('div', { key: i, style: { display: 'inline-flex', alignItems: 'center' } },
                      h('span', { style: { fontFamily: 'Inter, sans-serif', fontSize: 10, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', padding: '0 28px', color: 'rgba(255,255,255,0.5)' } }, item),
                      h('span', { style: { color: T.primary + '99' } }, '·'),
                    );
                  })
                ),
              ),

              /* ── BRAND INTRO ── */
              h(SectionTag, { text: 'Brand Intro Section' }),
              h('section', {
                style: {
                  background: T.bg,
                  padding: mobile ? '64px 24px' : '96px 80px',
                  borderBottom: '1px solid ' + T.border,
                }
              },
                h('div', {
                  style: {
                    display: 'grid',
                    gridTemplateColumns: mobile ? '1fr' : '1fr 1fr',
                    gap: mobile ? 40 : 72,
                    alignItems: 'start',
                  }
                },
                  h('div', null,
                    h('h2', {
                      style: {
                        fontFamily: 'Syne, sans-serif',
                        fontWeight: 700,
                        fontSize: mobile ? 28 : 'clamp(26px, 3vw, 42px)',
                        lineHeight: 1.08,
                        letterSpacing: '-0.025em',
                        color: T.fg,
                      }
                    },
                      ip1 + ' ',
                      h('em', { style: { color: T.primary, fontStyle: 'italic' } }, iItal),
                      ' ' + ip2,
                    ),
                  ),
                  h('div', { style: { display: 'flex', flexDirection: 'column', gap: 24 } },
                    h('p', { style: { fontSize: 17, lineHeight: 1.8, color: T.muted } }, ib1),
                    h('p', { style: { fontSize: 17, lineHeight: 1.8, color: T.muted } }, ib2),
                  ),
                ),
              ),

              /* ── SERVICES ── */
              h(SectionTag, { text: 'What We Do Section' }),
              h('section', {
                style: {
                  background: T.dark,
                  padding: mobile ? '64px 24px' : '96px 80px',
                }
              },
                h('div', { style: { marginBottom: 56 } },
                  h(Eyebrow, { text: 'Our Expertise', mb: 16 }),
                  h('h2', {
                    style: {
                      fontFamily: 'Syne, sans-serif',
                      fontWeight: 700,
                      fontSize: mobile ? 32 : 48,
                      lineHeight: 1.08,
                      letterSpacing: '-0.025em',
                      color: '#fff',
                    }
                  }, servHl),
                ),
                h('div', null,
                  services.map(function(svc, i) {
                    return h('div', {
                      key: i,
                      style: {
                        display: 'grid',
                        gridTemplateColumns: mobile ? '1fr' : 'auto 1fr 2fr',
                        gap: mobile ? 8 : '16px 48px',
                        padding: '24px 0',
                        borderTop: '1px solid rgba(255,255,255,0.07)',
                      }
                    },
                      h('span', { style: { fontFamily: 'Inter, sans-serif', fontSize: 10, fontWeight: 700, color: T.primary + '55', letterSpacing: '0.15em', paddingTop: 4 } }, svc.num),
                      h('h3', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 20, color: '#fff', lineHeight: 1.2 } }, svc.title),
                      h('p', { style: { fontFamily: 'Inter, sans-serif', fontSize: 15, lineHeight: 1.72, color: 'rgba(255,255,255,0.45)' } }, svc.desc),
                    );
                  }),
                  h('div', { style: { borderTop: '1px solid rgba(255,255,255,0.07)' } }),
                ),
              ),
            ),
          );
        };

        return HomePreview;
      }(React.Component));

      CMS.registerPreviewTemplate('home', HomePreview);

      /* ══════════════════════════════════════════════════════════
         ABOUT PAGE PREVIEW
      ══════════════════════════════════════════════════════════ */
      var AboutPreview = (function(_super) {
        function AboutPreview(props) {
          _super.call(this, props);
          this.state = { mobile: false };
        }
        AboutPreview.prototype = Object.create(_super.prototype);
        AboutPreview.prototype.constructor = AboutPreview;

        AboutPreview.prototype.render = function() {
          var g = gf(this.props.entry);
          var mobile = this.state.mobile;

          var hEy    = g('hero','eyebrow')        || 'Who We Are';
          var hL1    = g('hero','headline_1')      || 'We believe every brand has a';
          var hItal  = g('hero','headline_italic') || 'story';
          var hL2    = g('hero','headline_2')      || 'worth telling well.';
          var hC1    = g('hero','intro_col1')      || '';
          var hC2    = g('hero','intro_col2')      || '';

          var sEy    = g('story','eyebrow')  || 'Our Story';
          var sHl    = g('story','headline') || 'Built for brands serious about where they are going.';
          var sB1    = g('story','body1')    || '';
          var sB2    = g('story','body2')    || '';
          var sB3    = g('story','body3')    || '';
          var sImg   = g('story','image')    || '';

          var stats  = g('stats') || [
            { value:'10+',  label:'Years of Regional Marketing Experience' },
            { value:'50+',  label:'Brand Campaigns Executed' },
            { value:'5',    label:'Core Service Disciplines' },
            { value:'100%', label:'Senior Team on Every Account' },
          ];

          var pHl    = g('principles','headline') || 'Four principles we do not negotiate on.';
          var pSub   = g('principles','subtext')  || '';
          var pItems = g('principles','items')    || [];

          var phEy   = g('philosophy','eyebrow')  || 'How We Think';
          var phHl   = g('philosophy','headline') || 'The philosophy behind the work.';
          var phItems= g('philosophy','items')    || [];

          var tEy    = g('team','eyebrow')  || 'The Team';
          var tHl    = g('team','headline') || 'Senior people on every account.';
          var tSub   = g('team','subtext')  || '';
          var tMems  = g('team','members')  || [];

          var ctaEy  = g('cta','eyebrow')         || 'Work With Us';
          var ctaL1  = g('cta','headline_1')       || 'The right relationship starts with';
          var ctaItal= g('cta','headline_italic')  || 'the right conversation.';
          var ctaSub = g('cta','subtext')          || '';

          return h('div', { style: { fontFamily: 'Inter, sans-serif', background: T.bg } },

            /* toolbar */
            h('div', {
              style: { background: T.dark, padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12, position: 'sticky', top: 0, zIndex: 200 }
            },
              h('span', { style: { fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 14, color: '#fff', letterSpacing: '-0.02em' } }, 'M.Y. INK'),
              h('span', { style: { fontSize: 9, fontWeight: 700, color: T.primary, textTransform: 'uppercase', letterSpacing: '0.18em', background: T.primary + '22', padding: '2px 8px' } }, 'Live Preview — About'),
              h('div', { style: { marginLeft: 'auto', display: 'flex', gap: 6 } },
                h('button', { onClick: function(){ this.setState({mobile:false}); }.bind(this), style: { padding:'4px 12px', fontSize:9, fontWeight:700, letterSpacing:'0.15em', textTransform:'uppercase', border:'1px solid', cursor:'pointer', background: !mobile ? T.primary:'transparent', color: !mobile ?'#fff':'rgba(255,255,255,0.35)', borderColor: !mobile ? T.primary:'rgba(255,255,255,0.15)' } }, 'Desktop'),
                h('button', { onClick: function(){ this.setState({mobile:true}); }.bind(this), style: { padding:'4px 12px', fontSize:9, fontWeight:700, letterSpacing:'0.15em', textTransform:'uppercase', border:'1px solid', cursor:'pointer', background: mobile ? T.primary:'transparent', color: mobile?'#fff':'rgba(255,255,255,0.35)', borderColor: mobile ? T.primary:'rgba(255,255,255,0.15)' } }, 'Mobile'),
              ),
            ),

            h('div', {
              style: {
                margin: mobile ? '20px auto' : 0,
                maxWidth: mobile ? 390 : '100%',
                boxShadow: mobile ? '0 0 0 1px rgba(0,0,0,0.1),0 8px 40px rgba(0,0,0,0.15)' : 'none',
                overflow: 'hidden',
              }
            },

              h(Navbar, null),

              /* ── HERO ── */
              h(SectionTag, { text: 'Hero Section' }),
              h('section', { style: { background: T.bg, padding: mobile ? '64px 24px 48px' : '100px 80px 72px', borderBottom: '1px solid ' + T.border, position: 'relative', overflow: 'hidden' } },
                h('div', { style: { position:'absolute', top:0, right:0, width:1, height:'100%', background: T.primary + '18', pointerEvents:'none' } }),
                h(Eyebrow, { text: hEy, mb: 28 }),
                h('h1', {
                  style: {
                    fontFamily: 'Syne, sans-serif', fontWeight: 800,
                    fontSize: mobile ? 44 : 'clamp(40px, 6.5vw, 80px)',
                    lineHeight: 1.02, letterSpacing: '-0.03em',
                    color: T.fg, marginBottom: 48, maxWidth: '80rem',
                  }
                },
                  hL1 + ' ',
                  h('em', { style: { color: T.primary, fontStyle: 'italic' } }, hItal),
                  ' ' + hL2,
                ),
                h('div', { style: { display: 'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 1fr', gap: 40 } },
                  h('p', { style: { fontSize: 18, lineHeight: 1.8, color: T.muted } }, hC1),
                  h('p', { style: { fontSize: 18, lineHeight: 1.8, color: T.muted } }, hC2),
                ),
              ),

              /* ── OUR STORY ── */
