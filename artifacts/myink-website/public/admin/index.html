<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — M.Y. INK</title>

    <!-- ① Netlify Identity widget ────────────────────────────── -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- ② React 17 (loaded FIRST so Decap CMS reuses it) ─────── -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  </head>

  <body>
    <!-- ③ netlify-cms v2 / Decap v2 (finds React already on window) ─── -->
    <script src="https://unpkg.com/netlify-cms@2.10.192/dist/netlify-cms.js"></script>

    <script>
      /* ═══════════════════════════════════════════════════════
         M.Y. INK — CMS Live Preview  (Decap CMS v2)

         Uses window.React loaded above — NOT CMS.React.
         All templates are plain functions (no hooks) so there
         are zero React-instance conflicts.
      ═══════════════════════════════════════════════════════ */

      var React = window.React;
      var h     = React.createElement;

      /* ── Design tokens ─────────────────────────────────── */
      var C = {
        primary : '#E87722',
        bg      : '#F7F7F7',
        fg      : '#0D0D0D',
        muted   : 'rgba(13,13,13,0.55)',
        card    : '#FFFFFF',
        dark    : '#121212',
        border  : '#E2E2E2',
      };

      /* ── Fonts & base reset in preview iframe ──────────── */
      CMS.registerPreviewStyle(
        'https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap'
      );

      CMS.registerPreviewStyle([
        '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}',
        'body{font-family:Inter,sans-serif;background:#F7F7F7;color:#0D0D0D;-webkit-font-smoothing:antialiased;}',
        'h1,h2,h3,h4,h5{font-family:Syne,sans-serif;font-weight:700;letter-spacing:-0.025em;}',
        'p{margin:0;line-height:1.75;}',
        'img{max-width:100%;display:block;}',
      ].join(''), { raw: true });

      /* ── Safe field reader ─────────────────────────────────
         Wraps Immutable.js access in try/catch.
         Returns '' for missing strings, [] for missing lists.
      ───────────────────────────────────────────────────── */
      function gf(entry) {
        return function() {
          try {
            var path = ['data'].concat(Array.prototype.slice.call(arguments));
            var val  = entry.getIn(path);
            if (val === null || val === undefined) return undefined;
            if (val && typeof val.toJS === 'function') return val.toJS();
            return String(val);
          } catch (e) { return undefined; }
        };
      }

      /* ── Tiny layout helpers ─────────────────────────────── */
      function Row(style, children) {
        return h('div', { style: Object.assign({ display: 'flex' }, style) }, children);
      }
      function Grid(cols, gap, style, children) {
        return h('div', { style: Object.assign({ display: 'grid', gridTemplateColumns: cols, gap: gap }, style) }, children);
      }
      function Label(text) {
        return h('p', {
          style: { fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: C.primary, marginBottom: 16 },
        }, text);
      }
      function Divider(color) {
        return h('div', { style: { borderTop: '1px solid ' + (color || C.border), margin: 0 } });
      }
      function SectionTag(label) {
        return h('div', {
          style: { background: C.dark, padding: '5px 32px', borderBottom: '1px solid rgba(232,119,34,0.2)' },
        }, h('span', { style: { fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.22em', color: C.primary } }, label));
      }
      function OrangeBtn(text) {
        return h('div', {
          style: {
            display: 'inline-block', background: C.primary, color: '#fff',
            padding: '14px 28px', fontSize: 10, fontWeight: 700,
            textTransform: 'uppercase', letterSpacing: '0.14em', cursor: 'pointer',
          },
        }, text);
      }
      function GhostBtn(text) {
        return h('div', {
          style: {
            display: 'inline-block', border: '1px solid rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.65)',
            padding: '14px 28px', fontSize: 10, fontWeight: 700,
            textTransform: 'uppercase', letterSpacing: '0.14em', cursor: 'pointer',
          },
        }, text);
      }

      /* ════════════════════════════════════════════════════════
         ABOUT PAGE PREVIEW TEMPLATE
      ════════════════════════════════════════════════════════ */
      function AboutPreview(props) {
        var g = gf(props.entry);

        /* ── Hero ────────────────────────────────────────── */
        var hEyebrow = g('hero','eyebrow')          || 'Who We Are';
        var hLine1   = g('hero','headline_1')        || 'We believe every brand has a';
        var hItalic  = g('hero','headline_italic')   || 'story';
        var hLine2   = g('hero','headline_2')        || 'worth telling well.';
        var hCol1    = g('hero','intro_col1')        || '';
        var hCol2    = g('hero','intro_col2')        || '';

        /* ── Our Story ───────────────────────────────────── */
        var sEyebrow = g('story','eyebrow')   || 'Our Story';
        var sHl      = g('story','headline')  || 'Built for brands serious about where they are going.';
        var sBody1   = g('story','body1')     || '';
        var sBody2   = g('story','body2')     || '';
        var sBody3   = g('story','body3')     || '';

        /* ── Stats ───────────────────────────────────────── */
        var stats = g('stats') || [
          { value: '10+',  label: 'Years of Regional Marketing Experience' },
          { value: '50+',  label: 'Brand Campaigns Executed' },
          { value: '5',    label: 'Core Service Disciplines' },
          { value: '100%', label: 'Senior Team on Every Account' },
        ];

        /* ── Principles ──────────────────────────────────── */
        var pHl    = g('principles','headline') || 'Four principles we do not negotiate on.';
        var pSub   = g('principles','subtext')  || 'These are not values statements written for a website.';
        var pItems = g('principles','items')    || [
          { num:'01', title:'Strategy First. Always.',      desc:'Every piece of work we produce traces back to a clear strategy.' },
          { num:'02', title:'Excellence in Execution',      desc:'We work with clients who notice the difference between good and excellent.' },
          { num:'03', title:'Selective by Design',          desc:'The value of a smaller client roster is that every brand gets more of us.' },
          { num:'04', title:'Creative Without Compromise',  desc:'Predictability is the enemy of a brand that wants to stand out.' },
        ];

        /* ── Philosophy ──────────────────────────────────── */
        var philEy    = g('philosophy','eyebrow')  || 'How We Think';
        var philHl    = g('philosophy','headline') || 'The philosophy behind the work.';
        var philItems = g('philosophy','items')    || [
          { title:'The thinking comes first.',          desc:'Executing the wrong strategy beautifully is still the wrong strategy.' },
          { title:'We make our clients look prescient.', desc:'The best strategic advice positions a brand ahead of where the market is going.' },
          { title:'We define success before we begin.',  desc:'Vague goals produce vague results.' },
        ];

        /* ── Team ────────────────────────────────────────── */
        var tEyebrow = g('team','eyebrow')  || 'The Team';
        var tHl      = g('team','headline') || 'Senior people on every account.';
        var tSub     = g('team','subtext')  || 'No junior strategists running accounts.';
        var tMembers = g('team','members')  || [
          { role:'Partner & Strategy Director', specialty:'Brand Strategy · Positioning' },
          { role:'Creative Director',            specialty:'Campaigns · Art Direction' },
          { role:'Head of Digital & Content',    specialty:'Digital · Editorial' },
        ];

        /* ── CTA ─────────────────────────────────────────── */
        var ctaEy   = g('cta','eyebrow')        || 'Work With Us';
        var ctaL1   = g('cta','headline_1')     || 'The right relationship starts with';
        var ctaItal = g('cta','headline_italic') || 'the right conversation.';
        var ctaSub  = g('cta','subtext')        || 'If something you\'ve read here sounds like what your brand has been missing, that intuition is worth acting on.';

        /* ── Heading size helpers ──────────────────────────── */
        var H1 = { fontFamily:'Syne,sans-serif', fontWeight:800, fontSize:'clamp(34px,6vw,76px)', lineHeight:1.0, letterSpacing:'-0.03em', color:C.fg };
        var H2 = { fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:'clamp(24px,3.5vw,44px)', lineHeight:1.08, letterSpacing:'-0.025em' };
        var H2sm = { fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:28, lineHeight:1.15, letterSpacing:'-0.02em' };
        var H3 = { fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:20, lineHeight:1.25, letterSpacing:'-0.015em' };
        var BODY = { fontSize:17, lineHeight:1.78, color:C.muted };
        var BODY_SM = { fontSize:15, lineHeight:1.75, color:C.muted };
        var PAD = { padding:'72px 48px' };

        return h('div', { style:{ fontFamily:'Inter,sans-serif', background:C.bg, minHeight:'100vh' } },

          /* ── HERO ─────────────────────────────────────────── */
          SectionTag('Hero Section'),
          h('section', { style: Object.assign({}, PAD, { background:C.bg, borderBottom:'1px solid '+C.border }) },
            Label(hEyebrow),
            h('h1', { style: Object.assign({}, H1, { marginBottom:40 }) },
              hLine1 + ' ',
              h('em', { style:{ color:C.primary, fontStyle:'italic' } }, hItalic),
              ' ' + hLine2,
            ),
            Grid('1fr 1fr', 40, {},
              [
                h('p', { key:'c1', style:BODY }, hCol1),
                h('p', { key:'c2', style:BODY }, hCol2),
              ]
            ),
          ),

          /* ── OUR STORY ────────────────────────────────────── */
          SectionTag('Our Story'),
          h('section', { style: Object.assign({}, PAD, { background:C.card, borderBottom:'1px solid '+C.border }) },
            Grid('1fr 1fr', 56, { alignItems:'start' },
              [
                /* image column */
                h('div', { key:'img', style:{ position:'relative' } },
                  h('div', {
                    style:{
                      width:'100%', aspectRatio:'4/5', background:C.dark,
                      display:'flex', alignItems:'center', justifyContent:'center',
                    },
                  },
                    h('span', { style:{ color:'rgba(255,255,255,0.18)', fontSize:12, letterSpacing:'0.1em', textTransform:'uppercase' } }, 'Story Image'),
                  ),
                  h('div', {
                    style:{
                      position:'absolute', bottom:-20, right:-20,
                      background:C.primary, padding:24,
                    },
                  },
                    h('p', { style:{ color:'#fff', fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:15, lineHeight:1.3 } }, 'Nassau, Bahamas'),
                    h('p', { style:{ color:'rgba(255,255,255,0.65)', fontSize:12, marginTop:4 } }, 'Est. Caribbean'),
                  ),
                ),
                /* text column */
                h('div', { key:'txt' },
                  Label(sEyebrow),
                  h('h2', { style: Object.assign({}, H2sm, { color:C.fg, marginBottom:28 }) }, sHl),
                  h('div', { style:{ display:'flex', flexDirection:'column', gap:18 } },
                    h('p', { style:BODY }, sBody1),
                    h('p', { style:BODY }, sBody2),
                    h('p', { style:BODY }, sBody3),
                  ),
                  h('div', { style:{ marginTop:32 } }, OrangeBtn('See What We Offer →')),
                ),
              ]
            ),
          ),

          /* ── STATS ────────────────────────────────────────── */
          SectionTag('Stats'),
          h('section', { style:{ background:C.bg, borderTop:'1px solid '+C.border, borderBottom:'1px solid '+C.border } },
            h('div', {
              style:{
                display:'grid',
                gridTemplateColumns:'repeat('+stats.length+',1fr)',
              },
            },
              stats.map(function(stat, i) {
                return h('div', { key:i,
                  style:{
                    padding:'36px 32px',
                    borderRight: i < stats.length - 1 ? '1px solid '+C.border : 'none',
                    textAlign:'center',
                  },
                },
                  h('span', { style:{ fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:56, color:C.primary, display:'block', lineHeight:1.0 } }, stat.value),
                  h('span', { style:{ fontSize:13, color:C.muted, display:'block', marginTop:10, lineHeight:1.4 } }, stat.label),
                );
              })
            ),
          ),

          /* ── PRINCIPLES ───────────────────────────────────── */
          SectionTag('Principles'),
          h('section', { style: Object.assign({}, PAD, { background:C.bg }) },
            h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:32, marginBottom:56 } },
              h('h2', { style: Object.assign({}, H2, { color:C.fg }) }, pHl),
              h('p', { style: Object.assign({}, BODY, { alignSelf:'end' }) }, pSub),
            ),
            h('div', null,
              pItems.map(function(item, i) {
                return h('div', { key:i },
                  Divider(C.border),
                  h('div', {
                    style:{
                      display:'grid', gridTemplateColumns:'40px 1fr 2fr',
                      gap:'12px 40px', padding:'28px 0',
                    },
                  },
                    h('span', { style:{ fontSize:11, fontWeight:700, color:C.primary+'55', letterSpacing:'0.12em', paddingTop:3 } }, item.num),
                    h('h3', { style: Object.assign({}, H3, { color:C.fg }) }, item.title),
                    h('p', { style:BODY_SM }, item.desc),
                  ),
                );
              }),
              Divider(C.border),
            ),
          ),

          /* ── PHILOSOPHY ───────────────────────────────────── */
          SectionTag('Philosophy'),
          h('section', { style: Object.assign({}, PAD, { background:C.dark }) },
            Label(philEy),
            h('h2', { style: Object.assign({}, H2, { color:'#fff', marginBottom:56 }) }, philHl),
            h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)' } },
              philItems.map(function(item, i) {
                return h('div', { key:i,
                  style:{
                    padding:'32px',
                    borderLeft: i > 0 ? '1px solid rgba(255,255,255,0.07)' : 'none',
                  },
                },
                  h('div', { style:{ width:28, height:2, background:C.primary, marginBottom:28 } }),
                  h('h3', { style:{ fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:18, color:'#fff', lineHeight:1.3, marginBottom:16, letterSpacing:'-0.01em' } }, item.title),
                  h('p', { style:{ fontSize:14, lineHeight:1.8, color:'rgba(255,255,255,0.45)' } }, item.desc),
                );
              })
            ),
          ),

          /* ── TEAM ─────────────────────────────────────────── */
          SectionTag('Team'),
          h('section', { style: Object.assign({}, PAD, { background:C.card, borderTop:'1px solid '+C.border }) },
            Label(tEyebrow),
            h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:48 } },
              h('h2', { style: Object.assign({}, H2, { color:C.fg }) }, tHl),
              h('p', { style:BODY }, tSub),
            ),
            h('div', { style:{ display:'grid', gridTemplateColumns:'repeat('+Math.min(tMembers.length,3)+',1fr)', gap:24 } },
              tMembers.map(function(member, i) {
                return h('div', { key:i },
                  h('div', {
                    style:{
                      background:C.dark, aspectRatio:'3/4',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      marginBottom:20, overflow:'hidden',
                    },
                  },
                    member.photo
                      ? h('img', { src:member.photo, style:{ width:'100%', height:'100%', objectFit:'cover', opacity:0.65 } })
                      : h('span', { style:{ color:'rgba(255,255,255,0.15)', fontSize:11, textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Photo'),
                  ),
                  h('p', { style:{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.17em', color:C.primary, marginBottom:8 } }, member.role),
                  h('p', { style:{ fontSize:13, color:C.muted } }, member.specialty),
                );
              })
            ),
          ),

          /* ── CTA ──────────────────────────────────────────── */
          SectionTag('CTA Section'),
          h('section', { style: Object.assign({}, PAD, { background:C.dark }) },
            h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:40, alignItems:'end' } },
              h('div', null,
                Label(ctaEy),
                h('h2', { style:{
                  fontFamily:'Syne,sans-serif', fontWeight:700,
                  fontSize:'clamp(28px,4.5vw,56px)', lineHeight:1.06,
                  letterSpacing:'-0.025em', color:'#fff', marginBottom:20,
                } },
                  ctaL1 + ' ',
                  h('em', { style:{ color:C.primary, fontStyle:'italic' } }, ctaItal),
                ),
                h('p', { style:{ fontSize:17, lineHeight:1.75, color:'rgba(255,255,255,0.48)', maxWidth:480 } }, ctaSub),
              ),
              h('div', { style:{ display:'flex', flexDirection:'column', gap:12 } },
                OrangeBtn('Start a Conversation'),
                GhostBtn('See Our Work'),
              ),
            ),
          ),

        ); /* end root div */
      }

      CMS.registerPreviewTemplate('about', AboutPreview);

    </script>
  </body>
</html>
