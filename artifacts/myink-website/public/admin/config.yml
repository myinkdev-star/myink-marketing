# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# M.Y. INK — Decap CMS Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# DEPLOYMENT NOTE — MONOREPO FILE PATHS:
#   Decap CMS paths are always relative to the git repository root.
#   If your git repo is the full monorepo (not just this site folder),
#   prefix every `file:` and `folder:` value with the site subdirectory.
#   Example:  "public/content/home.md"
#         →  "artifacts/myink-website/public/content/home.md"
#
# LOCAL TESTING:
#   Run `npx decap-server` in a terminal, then uncomment `local_backend`.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

backend:
  name: git-gateway
  branch: master

# local_backend: true

media_folder: "public/images"
public_folder: "/images"

locale: en
show_preview_links: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COLLECTIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

collections:

  # ────────────────────────────────────────────────────────────
  # HOME PAGE  ·  Section-by-section editing
  # ────────────────────────────────────────────────────────────
  - name: "home"
    label: "🏠  Home Page"
    files:
      - name: "home"
        label: "Home Page Sections"
        file: "public/content/home.md"
        fields:

          # ── Hero Section ─────────────────────────────────────
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            summary: "The full-screen opening section with billboard headline"
            fields:
              - label: "Headline — Line 1"
                name: "headline_line1"
                widget: "string"
                default: "Creative Thinking."
                hint: "First line of the large hero headline."
              - label: "Headline — Line 2"
                name: "headline_line2"
                widget: "string"
                default: "Strategic Execution."
                hint: "Second line of the hero headline."
              - label: "Headline — Italic Payoff (orange)"
                name: "headline_italic"
                widget: "string"
                default: "Meaningful Growth."
                hint: "Third line — renders in italic orange text."
              - label: "Hero Body Copy"
                name: "body"
                widget: "text"
                hint: "The paragraph below the main headline."
              - label: "Location Badge"
                name: "location_badge"
                widget: "string"
                default: "Nassau, Bahamas · Strategic Marketing Firm"
                hint: "Small badge above the headline."

          # ── Brand Intro Section ───────────────────────────────
          - label: "Brand Intro Section"
            name: "brand_intro"
            widget: "object"
            collapsed: false
            summary: "Positioning statement and brand philosophy"
            fields:
              - label: "Headline — Part 1"
                name: "headline_part1"
                widget: "string"
                hint: "Text before the italic (orange) portion."
              - label: "Headline — Italic (orange)"
                name: "headline_italic"
                widget: "string"
                hint: "This portion renders in italic orange."
              - label: "Headline — Part 2"
                name: "headline_part2"
                widget: "string"
                hint: "Text after the italic portion."
              - label: "Body Paragraph 1"
                name: "body1"
                widget: "text"
              - label: "Body Paragraph 2"
                name: "body2"
                widget: "text"

          # ── What We Do Section ────────────────────────────────
          - label: "What We Do Section"
            name: "what_we_do"
            widget: "object"
            collapsed: false
            summary: "The five-services overview teaser"
            fields:
              - label: "Section Headline"
                name: "headline"
                widget: "string"
                default: "Five disciplines. One standard."
                hint: "The bold heading above the five service cards."

  # ────────────────────────────────────────────────────────────
  # SERVICE CATEGORIES  ·  One file per service
  # ────────────────────────────────────────────────────────────
  - name: "service_categories"
    label: "⚙️  Service Categories"
    folder: "public/content/services"
    create: false
    slug: "{{num}}"
    fields:
      - label: "Number"
        name: "num"
        widget: "string"
        hint: "e.g. 01, 02, 03 — used for display ordering."
      - label: "Category Title"
        name: "title"
        widget: "string"
        hint: "e.g. Brand & Marketing Strategy"
      - label: "Italic Tagline"
        name: "tagline"
        widget: "string"
        hint: "Short italicised quote shown below the title."
      - label: "Introduction Paragraph"
        name: "intro"
        widget: "text"
        hint: "Opening paragraph for this service category."
      - label: "Services Offered"
        name: "services"
        widget: "list"
        label_singular: "Service"
        hint: "Lead each item with the exact service name, then add context after a dash."
        field:
          label: "Service Item"
          name: "item"
          widget: "string"
      - label: "The Outcome"
        name: "outcome"
        widget: "text"
        hint: "What the client receives at the end of this engagement."
      - label: "Ideal Client"
        name: "idealClient"
        widget: "text"
        hint: "Who this service is best suited for."
      - label: "Section Image (optional)"
        name: "image"
        widget: "image"
        required: false
        hint: "Optional header image for this service category."

  # ────────────────────────────────────────────────────────────
  # WORK PAGE
  # ────────────────────────────────────────────────────────────
  - name: "work_page"
    label: "💼  Work Page"
    files:
      - name: "work"
        label: "Work Page Content"
        file: "public/content/work.md"
        fields:
          - label: "Page Eyebrow"
            name: "page_eyebrow"
            widget: "string"
            default: "Our Work"
            hint: "Small uppercase label above the headline."
          - label: "Headline"
            name: "headline"
            widget: "string"
            hint: "Main headline, e.g. 'Work that earns'"
          - label: "Headline Italic (orange)"
            name: "headline_italic"
            widget: "string"
            hint: "The italic orange portion, e.g. 'its results.'"
          - label: "Intro Column 1"
            name: "intro_col1"
            widget: "text"
            hint: "Left paragraph below the headline."
          - label: "Intro Column 2"
            name: "intro_col2"
            widget: "text"
            hint: "Right paragraph below the headline."
          - label: "Social Invite Note"
            name: "social_note"
            widget: "text"
            hint: "Text shown above the social platform links at the bottom of the page."

  # ────────────────────────────────────────────────────────────
  # GLOBAL SETTINGS  ·  Brand, colour, contact, social
  # ────────────────────────────────────────────────────────────
  - name: "settings"
    label: "⚙️  Site Settings"
    files:
      - name: "settings"
        label: "Global Settings"
        file: "public/content/settings.md"
        fields:

          # ── Brand & Identity ──────────────────────────────────
          - label: "Brand & Identity"
            name: "brand"
            widget: "object"
            collapsed: false
            summary: "Site name, accent colour, tagline, and contact details"
            fields:
              - label: "Site Name"
                name: "site_name"
                widget: "string"
                default: "M.Y. INK"
              - label: "Brand Accent Colour"
                name: "primary_color"
                widget: "color"
                default: "#E87722"
                allow_input: true
                hint: "Applied to buttons, labels, highlights, and links everywhere on the site. Change with care."
              - label: "Footer Tagline"
                name: "tagline"
                widget: "text"
                hint: "The descriptor shown under the logo in the footer."
              - label: "Location"
                name: "location"
                widget: "string"
                default: "Nassau, Bahamas"
              - label: "Email Address"
                name: "email"
                widget: "string"
                default: "hello@myink.com"

          # ── Social Media ──────────────────────────────────────
          - label: "Social Media Links"
            name: "socials"
            widget: "object"
            collapsed: false
            summary: "Facebook, Instagram, YouTube and LinkedIn URLs"
            fields:
              - label: "Facebook URL"
                name: "facebook"
                widget: "string"
                required: false
              - label: "Instagram URL"
                name: "instagram"
                widget: "string"
                required: false
              - label: "YouTube URL"
                name: "youtube"
                widget: "string"
                required: false
              - label: "LinkedIn URL"
                name: "linkedin"
                widget: "string"
                required: false
