# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# M.Y. INK — Decap CMS Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# DEPLOYMENT — MONOREPO FILE PATHS:
#   These paths are relative to your git repository root.
#   If the full monorepo is the git root, prefix every `file:` and
#   `folder:` path with "artifacts/myink-website/".
#   Example: "public/content/home.md"
#         →  "artifacts/myink-website/public/content/home.md"
#
# LOCAL TESTING:
#   Run `npx decap-server` in a terminal, then uncomment `local_backend`.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

backend:
  name: github
  repo: myinkdev-star/myink-marketing
  branch: master

# local_backend: true

media_folder: "artifacts/myink-website/public/images"
public_folder: "/images"

locale: en
show_preview_links: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COLLECTIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

collections:

  # ────────────────────────────────────────────────────────────
  # HOME PAGE
  # ────────────────────────────────────────────────────────────
  - name: "home"
    label: "🏠  Home Page"
    files:
      - name: "home"
        label: "Home Page Sections"
        file: "artifacts/myink-website/public/content/home.md"
        fields:

          - label: "▸ Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            summary: "Headlines & opening copy"
            fields:
              - label: "Headline — Line 1"
                name: "headline_line1"
                widget: "string"
                hint: "First line of the billboard headline."
              - label: "Headline — Line 2"
                name: "headline_line2"
                widget: "string"
                hint: "Second line of the headline."
              - label: "Headline — Italic Payoff (orange)"
                name: "headline_italic"
                widget: "string"
                hint: "Third line, renders in italic orange."
              - label: "Hero Body Copy"
                name: "body"
                widget: "text"
                hint: "Paragraph below the headline."
              - label: "Location Badge"
                name: "location_badge"
                widget: "string"
                hint: "Small badge above the headline, e.g. 'Nassau, Bahamas · Strategic Marketing Firm'"

          - label: "▸ Brand Intro Section"
            name: "brand_intro"
            widget: "object"
            collapsed: true
            summary: "Positioning statement and philosophy"
            fields:
              - label: "Headline — Part 1 (before orange)"
                name: "headline_part1"
                widget: "string"
              - label: "Headline — Italic Word (orange)"
                name: "headline_italic"
                widget: "string"
                hint: "Renders in italic orange."
              - label: "Headline — Part 2 (after orange)"
                name: "headline_part2"
                widget: "string"
              - label: "Body Paragraph 1"
                name: "body1"
                widget: "text"
              - label: "Body Paragraph 2"
                name: "body2"
                widget: "text"

          - label: "▸ What We Do Section"
            name: "what_we_do"
            widget: "object"
            collapsed: true
            summary: "Services teaser headline"
            fields:
              - label: "Section Headline"
                name: "headline"
                widget: "string"
                hint: "Bold heading above the five service cards."

  # ────────────────────────────────────────────────────────────
  # ABOUT PAGE
  # ────────────────────────────────────────────────────────────
  - name: "about"
    label: "📋  About Page"
    files:
      - name: "about"
        label: "About Page Sections"
        file: "artifacts/myink-website/public/content/about.md"
        fields:

          - label: "▸ Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            summary: "Page headline and introduction"
            fields:
              - label: "Eyebrow Label"
                name: "eyebrow"
                widget: "string"
                hint: "Small uppercase label, e.g. 'Who We Are'"
              - label: "Headline — Before Italic"
                name: "headline_1"
                widget: "string"
              - label: "Headline — Italic Word (orange)"
                name: "headline_italic"
                widget: "string"
              - label: "Headline — After Italic"
                name: "headline_2"
                widget: "string"
              - label: "Intro Column 1"
                name: "intro_col1"
                widget: "text"
              - label: "Intro Column 2"
                name: "intro_col2"
                widget: "text"

          - label: "▸ Our Story Section"
            name: "story"
            widget: "object"
            collapsed: true
            summary: "Agency origin story and image"
            fields:
              - label: "Eyebrow Label"
                name: "eyebrow"
                widget: "string"
              - label: "Section Headline"
                name: "headline"
                widget: "string"
              - label: "Body Paragraph 1"
                name: "body1"
                widget: "text"
              - label: "Body Paragraph 2"
                name: "body2"
                widget: "text"
              - label: "Body Paragraph 3"
                name: "body3"
                widget: "text"
              - label: "Section Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Image shown alongside the story text."

          - label: "▸ Stats Section"
            name: "stats"
            widget: "list"
            collapsed: true
            label_singular: "Stat"
            summary: "{{fields.value}} — {{fields.label}}"
            max: 4
            fields:
              - label: "Number / Value"
                name: "value"
                widget: "string"
                hint: "e.g. 10+, 50+, 100%"
              - label: "Descriptor"
                name: "label"
                widget: "string"

          - label: "▸ Principles Section"
            name: "principles"
            widget: "object"
            collapsed: true
            summary: "Four core operating principles"
            fields:
              - label: "Section Headline"
                name: "headline"
                widget: "string"
              - label: "Section Subtext"
                name: "subtext"
                widget: "text"
              - label: "Principles"
                name: "items"
                widget: "list"
                label_singular: "Principle"
                summary: "{{fields.num}} — {{fields.title}}"
                max: 4
                fields:
                  - label: "Number"
                    name: "num"
                    widget: "string"
                    hint: "e.g. 01, 02, 03"
                  - label: "Title"
                    name: "title"
                    widget: "string"
                  - label: "Description"
                    name: "desc"
                    widget: "text"

          - label: "▸ Philosophy Section"
            name: "philosophy"
            widget: "object"
            collapsed: true
            summary: "How we think"
            fields:
              - label: "Eyebrow Label"
                name: "eyebrow"
                widget: "string"
              - label: "Section Headline"
                name: "headline"
                widget: "string"
              - label: "Philosophy Points"
                name: "items"
                widget: "list"
                label_singular: "Point"
                summary: "{{fields.title}}"
                max: 3
                fields:
                  - label: "Title"
                    name: "title"
                    widget: "string"
                  - label: "Description"
                    name: "desc"
                    widget: "text"

          - label: "▸ Team Section"
            name: "team"
            widget: "object"
            collapsed: true
            summary: "Team members"
            fields:
              - label: "Eyebrow Label"
                name: "eyebrow"
                widget: "string"
              - label: "Section Headline"
                name: "headline"
                widget: "string"
              - label: "Section Subtext"
                name: "subtext"
                widget: "text"
              - label: "Team Members"
                name: "members"
                widget: "list"
                label_singular: "Team Member"
                summary: "{{fields.role}}"
                max: 6
                fields:
                  - label: "Role / Title"
                    name: "role"
                    widget: "string"
                  - label: "Specialty"
                    name: "specialty"
                    widget: "string"
                  - label: "Photo"
                    name: "photo"
                    widget: "image"
                    required: false

          - label: "▸ CTA Section"
            name: "cta"
            widget: "object"
            collapsed: true
            summary: "Call to action at the bottom"
            fields:
              - label: "Eyebrow Label"
                name: "eyebrow"
                widget: "string"
              - label: "Headline — Before Italic"
                name: "headline_1"
                widget: "string"
              - label: "Headline — Italic Part (orange)"
                name: "headline_italic"
                widget: "string"
              - label: "Subtext"
                name: "subtext"
                widget: "text"

  # ────────────────────────────────────────────────────────────
  # SERVICE CATEGORIES
  # ────────────────────────────────────────────────────────────
  - name: "service_categories"
    label: "🔧  Service Categories"
    folder: "artifacts/myink-website/public/content/services"
    create: false
    slug: "{{num}}"
    fields:
      - label: "Number"
        name: "num"
        widget: "string"
        hint: "e.g. 01 — used for ordering."
      - label: "Category Title"
        name: "title"
        widget: "string"
      - label: "Italic Tagline"
        name: "tagline"
        widget: "string"
        hint: "Short italicised line shown below the title."
      - label: "Introduction"
        name: "intro"
        widget: "text"
      - label: "Services Offered"
        name: "services"
        widget: "list"
        label_singular: "Service"
        hint: "Lead each item with the service name, then context after a dash."
        field:
          label: "Service"
          name: "item"
          widget: "string"
      - label: "The Outcome"
        name: "outcome"
        widget: "text"
      - label: "Ideal Client"
        name: "idealClient"
        widget: "text"
      - label: "Section Image (optional)"
        name: "image"
        widget: "image"
        required: false

  # ────────────────────────────────────────────────────────────
  # WORK PAGE
  # ────────────────────────────────────────────────────────────
  - name: "work_page"
    label: "💼  Work Page"
    files:
      - name: "work"
        label: "Work Page Content"
        file: "artifacts/myink-website/public/content/work.md"
        fields:
          - label: "Page Eyebrow"
            name: "page_eyebrow"
            widget: "string"
          - label: "Headline"
            name: "headline"
            widget: "string"
          - label: "Headline — Italic Part (orange)"
            name: "headline_italic"
            widget: "string"
          - label: "Intro Column 1"
            name: "intro_col1"
            widget: "text"
          - label: "Intro Column 2"
            name: "intro_col2"
            widget: "text"
          - label: "Social Invite Note"
            name: "social_note"
            widget: "text"
            hint: "Text shown above the social platform links."

  # ────────────────────────────────────────────────────────────
  # GLOBAL SETTINGS
  # ────────────────────────────────────────────────────────────
  - name: "settings"
    label: "⚙️  Site Settings"
    files:
      - name: "settings"
        label: "Global Settings"
        file: "artifacts/myink-website/public/content/settings.md"
        fields:

          - label: "▸ Brand & Identity"
            name: "brand"
            widget: "object"
            collapsed: false
            summary: "Site name, colour, tagline, contact"
            fields:
              - label: "Site Name"
                name: "site_name"
                widget: "string"
              - label: "Brand Accent Colour"
                name: "primary_color"
                widget: "color"
                allow_input: true
                hint: "Applied to buttons, labels, and highlights everywhere on the site."
              - label: "Footer Tagline"
                name: "tagline"
                widget: "text"
              - label: "Location"
                name: "location"
                widget: "string"
              - label: "Email Address"
                name: "email"
                widget: "string"

          - label: "▸ Social Media Links"
            name: "socials"
            widget: "object"
            collapsed: true
            summary: "Facebook, Instagram, YouTube, LinkedIn"
            fields:
              - label: "Facebook URL"
                name: "facebook"
                widget: "string"
                required: false
              - label: "Instagram URL"
                name: "instagram"
                widget: "string"
                required: false
              - label: "YouTube URL"
                name: "youtube"
                widget: "string"
                required: false
              - label: "LinkedIn URL"
                name: "linkedin"
                widget: "string"
                required: false
